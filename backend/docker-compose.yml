version: '3.9'

services:
  mongodb:
    image: mongo:7.0
    container_name: barbearia_mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  api:
    build: .
    container_name: barbearia_api
    restart: always
    ports:
      - "8001:8001"
    env_file:
      - .env
    depends_on:
      - mongodb
    environment:
      MONGO_URL: mongodb://mongodb:27017/barbershop_db?retryWrites=true&w=majority

volumes:
  mongodb_data: